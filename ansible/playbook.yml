---
- name: Deploy Quiz App
  hosts: all
  become: yes
  vars:
    app_dir: /opt/quiz-app
    app_port: 5000
    app_user: ubuntu
    app_env: "{{ app_environment | default('test') }}"

  tasks:
    - name: Set environment variable for app
      lineinfile:
        path: /etc/environment
        line: "APP_ENV={{ app_env }}"
        create: yes

    - name: Update apt cache
      apt:
        update_cache: yes
      changed_when: false

    - name: Install Python and pip
      apt:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install Flask
      pip:
        name: flask
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Create templates directory
      file:
        path: "{{ app_dir }}/templates"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Upload application file
      copy:
        src: ../quiz-app/app.py
        dest: "{{ app_dir }}/app.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Upload templates
      copy:
        src: ../quiz-app/templates/
        dest: "{{ app_dir }}/templates/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
      ignore_errors: yes

    - name: Create static directory
      file:
        path: "{{ app_dir }}/static"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Upload static files
      copy:
        src: ../quiz-app/static/
        dest: "{{ app_dir }}/static/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
      ignore_errors: yes

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/quiz-app.service
        content: |
          [Unit]
          Description=Quiz App - Cloud Computing Quiz
          After=network.target

          [Service]
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          Environment="APP_ENV={{ app_env }}"
          ExecStart=/usr/bin/python3 {{ app_dir }}/app.py
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart quiz-app service to apply environment
      systemd:
        name: quiz-app
        state: restarted
        enabled: yes

    - name: Allow port through firewall
      ufw:
        rule: allow
        port: "{{ app_port }}"
        proto: tcp
      changed_when: false
