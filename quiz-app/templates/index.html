<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз: Облачные вычисления по NIST</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .env-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            z-index: 1000;
            {% if app_env == 'prod' %}
            background: #B91C1C;
            color: #FFFFFF;
            {% else %}
            background: #1D4ED8;
            color: #FFFFFF;
            {% endif %}
        }
        .btn:hover {
            {% if app_env == 'prod' %}
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            {% else %}
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            {% endif %}
        }
    </style>
</head>
<body>
    <div class="env-badge">{{ app_env|upper }}</div>
    <div class="container container-center">
        <div class="cloud-icon">☁️</div>
        <h1>Квиз: Облачные вычисления</h1>
        <p>Проверьте свои знания основных понятий облачных вычислений по определениям NIST (National Institute of Standards and Technology).</p>
        <p>10 вопросов, 5 случайных будут выбраны для квиза.</p>
        <a href="{{ url_for('quiz') }}" class="btn">Начать квиз</a>
    </div>
</body>
</html>
