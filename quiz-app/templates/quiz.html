<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вопрос {{ current }} из {{ total }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .progress {
            background: #eee;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            height: 100%;
            transition: width 0.3s;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.4em;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option {
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option:hover {
            border-color: #11998e;
            background: #e8fff5;
        }
        .option input:checked + label {
            font-weight: bold;
        }
        .option:has(input:checked) {
            border-color: #11998e;
            background: #e8fff5;
        }
        .option input {
            display: none;
        }
        .option label {
            display: block;
            cursor: pointer;
            font-size: 1.1em;
            color: #444;
        }
        .btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress">
            <div class="progress-bar" style="width: {{ (current / total * 100) }}%"></div>
        </div>
        <h2>{{ question.question }}</h2>
        <form action="{{ url_for('answer') }}" method="POST" class="options">
            {% for option in question.options %}
            <div class="option">
                <input type="radio" name="answer" value="{{ loop.index0 }}" id="opt{{ loop.index0 }}" required>
                <label for="opt{{ loop.index0 }}">{{ option }}</label>
            </div>
            {% endfor %}
            <button type="submit" class="btn">Ответить</button>
        </form>
    </div>
</body>
</html>
