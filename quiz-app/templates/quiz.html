<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вопрос {{ current }} из {{ total }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .env-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            z-index: 1000;
            {% if app_env == 'prod' %}
            background: #B91C1C;
            color: #FFFFFF;
            {% else %}
            background: #1D4ED8;
            color: #FFFFFF;
            {% endif %}
        }
    </style>
</head>
<body>
    <div class="env-badge">{{ app_env|upper }}</div>
    <div class="container">
        <div class="progress">
            <div class="progress-bar" style="width: {{ (current / total * 100) }}%"></div>
        </div>
        <h2>{{ question.question }}</h2>
        <form action="{{ url_for('answer') }}" method="POST" class="options">
            {% for option in question.options %}
            <div class="option">
                <input type="radio" name="answer" value="{{ loop.index0 }}" id="opt{{ loop.index0 }}" required>
                <label for="opt{{ loop.index0 }}">{{ option }}</label>
            </div>
            {% endfor %}
            <button type="submit" class="btn">Ответить</button>
        </form>
    </div>
</body>
</html>
