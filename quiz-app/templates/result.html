<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .env-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            z-index: 1000;
            {% if app_env == 'prod' %}
            background: #B91C1C;
            color: #FFFFFF;
            {% else %}
            background: #1D4ED8;
            color: #FFFFFF;
            {% endif %}
        }
        .btn:hover {
            {% if app_env == 'prod' %}
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            {% else %}
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            {% endif %}
        }
    </style>
</head>
<body>
    <div class="env-badge">{{ app_env|upper }}</div>
    <div class="container">
        <h2>Результат квиза</h2>
        
        <div class="score-circle">
            <div class="score-number">{{ score }}</div>
            <div class="score-total">из {{ total }}</div>
        </div>
        
        <p style="font-size: 1.5em; margin-bottom: 10px;">{{ percentage }}%</p>
        
        <div class="message">{{ message }}</div>
        
        <a href="{{ url_for('index') }}" class="btn">Пройти заново</a>
    </div>
</body>
</html>
