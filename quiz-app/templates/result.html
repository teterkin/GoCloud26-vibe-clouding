<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .env-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            z-index: 1000;
            {% if app_env == 'prod' %}
            background: #B91C1C;
            color: #FFFFFF;
            {% else %}
            background: #1D4ED8;
            color: #FFFFFF;
            {% endif %}
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 30px auto;
            color: white;
        }
        .score-number {
            font-size: 3em;
            font-weight: bold;
        }
        .score-total {
            font-size: 1.2em;
            opacity: 0.9;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .message {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            {% if app_env == 'prod' %}
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            {% else %}
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            {% endif %}
        }
    </style>
</head>
<body>
    <div class="env-badge">{{ app_env|upper }}</div>
    <div class="container">
        <h2>Результат квиза</h2>
        
        <div class="score-circle">
            <div class="score-number">{{ score }}</div>
            <div class="score-total">из {{ total }}</div>
        </div>
        
        <p style="font-size: 1.5em; margin-bottom: 10px;">{{ percentage }}%</p>
        
        <div class="message">{{ message }}</div>
        
        <a href="{{ url_for('index') }}" class="btn">Пройти заново</a>
    </div>
</body>
</html>
